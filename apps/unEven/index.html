    <script>
      (function restoreGithubPagesRoute() {
        var url = new URL(window.location.href);
        var route = url.searchParams.get("__route");

        if (!route) {
          return;
        }

        var search = url.searchParams.get("__search") || "";
        var hash = url.searchParams.get("__hash") || "";
        var basePath = url.pathname.endsWith("/") ? url.pathname.slice(0, -1) : url.pathname;
        var nextPathname = (basePath || "") + route;

        window.history.replaceState(null, "", nextPathname + search + hash);
      })();
    </script>

    <div id="root"></div>
    <script src="/src/main.tsx" type="module"></script>
  </body>
